services:
  api:
    build:
      context: .
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/payloadcatcher
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: payloadcatcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payloadcatcher"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - payloadcatcher-postgres:/var/lib/postgresql/data

volumes:
  payloadcatcher-postgres:
